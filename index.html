<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="weather1.css">
</head>
<body>
    
           <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button>Search</button>
        </div>

        <div class="weather">
            <img src="https://static.vecteezy.com/system/resources/previews/024/825/182/large_2x/3d-weather-icon-day-with-rain-free-png.png" class="weather-icon" alt="Weather Icon">
            <h1 class="temp">--°C</h1>
            <h2 class="city">City Name</h2>
            <div class="details">
                <div class="col">
                    <div>
                        <p class="humidity">--%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <div>
                        <p class="wind">-- km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>


        <script>
           const apikey = "5d940e416e68064b34b6491c75fbab22";
const apiurl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

const searchBox = document.querySelector(".search input");
const searchBtn = document.querySelector(".search button");
const weatherIcon = document.querySelector(".weather-icon");

async function checkWeather(city) {
    try {
        const response = await fetch(`${apiurl}${city}&appid=${apikey}`);
        const data = await response.json();

        if (data.cod === "404") {
            alert("City not found!");
            return;
        }

        document.querySelector(".city").innerHTML = data.name;
        document.querySelector(".temp").innerHTML = `${data.main.temp}°C`;
        document.querySelector(".humidity").innerHTML = `${data.main.humidity}%`;
        document.querySelector(".wind").innerHTML = `${data.wind.speed} km/h`;

        const weather = data.weather[0].main.toLowerCase();

        if (weather.includes("cloud")) {
            weatherIcon.src = "https://static.vecteezy.com/system/resources/previews/008/854/796/original/weather-forecast-icon-cloudy-day-cloudy-with-sun-meteorology-sign-3d-rendering-png.png";
        } else if (weather.includes("clear")) {
            weatherIcon.src = "https://static.vecteezy.com/system/resources/previews/026/755/861/original/blue-cloud-and-yellow-sun-clear-weather-forecast-icon-isolated-on-white-background-vector.jpg";
        } else if (weather.includes("rain")) {
            weatherIcon.src = "https://static.vecteezy.com/system/resources/previews/034/988/834/non_2x/flat-cute-rain-cloud-illustration-symbol-with-unique-style-design-unusual-rainy-weather-forecast-template-vector.jpg";
        } else if (weather.includes("mist") || weather.includes("fog")) {
            weatherIcon.src = "https://cdn1.iconfinder.com/data/icons/weather-forecast-meteorology-color-1/128/weather-foggy-sunny-1024.png";
        } else {
            weatherIcon.src = "https://static.vecteezy.com/system/resources/previews/024/825/182/large_2x/3d-weather-icon-day-with-rain-free-png.png";
        }
    } catch (error) {
        alert("Error fetching weather data!");
        console.error(error);
    }
}

searchBtn.addEventListener("click", () => checkWeather(searchBox.value));

        </script>
    
</body>
</html>
